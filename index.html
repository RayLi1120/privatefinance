<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #181b21, #0f1114 60%) #0f1114;
    color: #e8e8e8; min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .gate {
    width: min(400px, 100%); background: #121418; border: 1px solid #23242a;
    border-radius: 24px; padding: 40px 32px 32px; text-align: center;
    box-shadow: 0 18px 44px rgba(0,0,0,.45);
  }
  .glock { margin: 0 auto 18px; width: 54px; height: 54px; border-radius: 50%;
    background: rgba(57,135,229,.12); display: flex; align-items: center; justify-content: center; }
  .brand { font-size: 18px; font-weight: 800; color: #e8eaee; letter-spacing: .3px; }
  .brand span { color: #6f7886; font-weight: 600; }
  .sub { margin-top: 8px; font-size: 13px; color: #6f7886; }
  .pw {
    margin-top: 26px; width: 100%; background: #1b1e24; border: 1px solid #2a2e35;
    border-radius: 10px; color: #fff; font: inherit; font-size: 16px; letter-spacing: 2px;
    text-align: center; padding: 12px 14px; outline: none;
  }
  .pw:focus { border-color: #3987e5; }
  .go {
    margin-top: 14px; width: 100%; background: #3987e5; border: 0; border-radius: 10px;
    color: #fff; font: inherit; font-size: 15.5px; font-weight: 700; padding: 12px; cursor: pointer;
  }
  .go:disabled { opacity: .55; cursor: default; }
  .err { margin-top: 14px; font-size: 13px; color: #ef454a; min-height: 18px; }
  .foot { margin-top: 18px; font-size: 11.5px; color: #565b63; letter-spacing: 1px; }
</style>

  var ITER = 600000;

  async function unlock() {
    var pass = pwEl.value.trim();
    if (!pass) return;
    goEl.disabled = true; goEl.textContent = "解密中…"; errEl.textContent = "";
    try {
      var bin = Uint8Array.from(atob(PAYLOAD), function (c) { return c.charCodeAt(0); });

      var pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: nonce }, key, ct);
      var html = new TextDecoder().decode(pt);
      document.open(); document.write(html); document.close();
