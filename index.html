  var ITER = 600000;

  var pwEl = document.getElementById("pw");
  var goEl = document.getElementById("go");
  var errEl = document.getElementById("err");

  async function unlock() {
    var pass = pwEl.value.trim();
    if (!pass) return;
    goEl.disabled = true; goEl.textContent = "解密中…"; errEl.textContent = "";
    try {
      var bin = Uint8Array.from(atob(PAYLOAD), function (c) { return c.charCodeAt(0); });
      var salt = bin.slice(0, 16), nonce = bin.slice(16, 28), ct = bin.slice(28);
      var km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);

        { name: "PBKDF2", salt: salt, iterations: ITER, hash: "SHA-256" },
        km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
      var pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: nonce }, key, ct);
      var html = new TextDecoder().decode(pt);
      document.open(); document.write(html); document.close();

      goEl.disabled = false; goEl.textContent = "解鎖";

  form.addEventListener("submit", function (e) { e.preventDefault(); unlock(); });
