<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: #05060a;
    color: #e8e8e8; min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    position: relative; overflow: hidden;
  }
  #rain { position: fixed; inset: 0; z-index: 0; opacity: .5; }
  .grid-floor {
    position: fixed; left: 50%; bottom: 0; width: 200%; height: 48%; z-index: 0; pointer-events: none;
    transform: translateX(-50%) perspective(360px) rotateX(64deg); transform-origin: bottom center;
    background-image: linear-gradient(rgba(140,100,255,.42) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(140,100,255,.32) 1px, transparent 1px);
    background-size: 46px 46px;
    -webkit-mask: linear-gradient(to top, #000 0%, rgba(0,0,0,.35) 55%, transparent 92%);
            mask: linear-gradient(to top, #000 0%, rgba(0,0,0,.35) 55%, transparent 92%);
    animation: floor 5.5s linear infinite;
  }
  @keyframes floor { from { background-position: 0 0, 0 0; } to { background-position: 0 46px, 0 0; } }
  .scan {
    position: fixed; left: 0; right: 0; top: 0; height: 2px; z-index: 1; pointer-events: none;
    background: linear-gradient(90deg, transparent, rgba(124,77,255,.7) 35%, rgba(57,135,229,.7) 65%, transparent);

    animation: scan 6s cubic-bezier(.4,0,.2,1) infinite;
  }

  .glow { position: fixed; z-index: 0; width: 620px; height: 620px; left: 50%; top: 42%; transform: translate(-50%,-50%); pointer-events: none;
    background: radial-gradient(circle, rgba(124,77,255,.16), transparent 62%); }
  .vig { position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(1050px 640px at 50% 44%, transparent, rgba(5,6,10,.66) 76%, #05060a); }
  .gate {
    position: relative; z-index: 3; width: min(410px, 100%);
    background: linear-gradient(165deg, rgba(20,22,32,.86), rgba(11,12,19,.86));
    border: 1px solid rgba(255,255,255,.1); border-radius: 22px;
    padding: 38px 32px 28px; text-align: center;
    backdrop-filter: blur(18px) saturate(1.15); -webkit-backdrop-filter: blur(18px) saturate(1.15);
    box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 42px rgba(124,77,255,.12), inset 0 1px 0 rgba(255,255,255,.06);
  }
  .gate::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 1px; border-radius: 22px 22px 0 0;
    background: linear-gradient(90deg, transparent, rgba(124,77,255,.55), rgba(57,135,229,.55), transparent); }
  .glock { position: relative; margin: 0 auto 16px; width: 56px; height: 56px; border-radius: 16px; overflow: hidden;
    background: radial-gradient(circle at 34% 28%, #9a7bff, #4b39c8 58%, #241f6e);
    display: flex; align-items: center; justify-content: center; box-shadow: 0 0 26px rgba(124,77,255,.5); }
  .glock::before { content: ""; position: absolute; inset: -30%;
    background: conic-gradient(from 0deg, transparent, rgba(255,255,255,.55), transparent 42%); animation: spin 5s linear infinite; }
  .glock svg { position: relative; z-index: 1; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { margin-bottom: 14px; font: 600 10.5px/1 "SFMono-Regular", Menlo, monospace; letter-spacing: 2px; color: #8a7bd8;
    display: inline-flex; align-items: center; gap: 7px; }
  .status i { width: 6px; height: 6px; border-radius: 50%; background: #48e0a4; box-shadow: 0 0 8px #48e0a4; animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  .brand { font-size: 19px; font-weight: 800; color: #eef1f6; letter-spacing: .3px; }
  .brand span { color: #6f7886; font-weight: 600; }
  .sub { margin-top: 8px; font-size: 12.5px; color: #7c8494; line-height: 1.55; }
  .pw {
    margin-top: 24px; width: 100%; background: rgba(0,0,0,.42); border: 1px solid rgba(255,255,255,.12);
    border-radius: 12px; color: #fff; font: inherit; font-size: 16px; letter-spacing: 3px;
    text-align: center; padding: 13px 14px; outline: none; transition: border-color .15s, box-shadow .15s;
  }
  .pw::placeholder { letter-spacing: 1px; color: #5c6473; }
  .pw:focus { border-color: #7c4dff; box-shadow: 0 0 0 3px rgba(124,77,255,.18); }
  .go {
    margin-top: 13px; width: 100%; background: linear-gradient(135deg, #7c4dff, #4f7ce6); border: 0; border-radius: 12px;
    color: #fff; font: inherit; font-size: 15.5px; font-weight: 700; padding: 13px; cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 8px 24px rgba(124,77,255,.3); transition: filter .15s, transform .05s;
  }
  .go:hover { filter: brightness(1.08); }
  .go:active { transform: translateY(1px); }
  .go:disabled { opacity: .6; cursor: default; filter: none; }
  .err { margin-top: 13px; font-size: 13px; color: #ff8a97; min-height: 18px; }
  .foot { margin-top: 18px; font: 600 10px/1 "SFMono-Regular", Menlo, monospace; letter-spacing: 1.5px; color: #565d69;
    display: flex; align-items: center; justify-content: center; gap: 7px; }
  .foot b { color: #7c8494; font-weight: 700; }
  @media (prefers-reduced-motion: reduce) { .grid-floor, .scan, .glock::before { animation: none; } }
</style>
